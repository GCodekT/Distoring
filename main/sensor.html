<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детали датчика - Distoring</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='28'>📡</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    
    <style>
        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #151933;
            --bg-tertiary: #1e2442;
            --accent: #00d4ff;
            --text-primary: #e8eaed;
            --text-secondary: #9aa0a6;
            --border: #2d3451;
            --success: #4caf50;
            --warning: #ff9800;
            --danger: #f44336;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 24px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .title {
            font-size: 28px;
            font-weight: 600;
        }
        
        .btn {
            padding: 10px 20px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn:hover {
            border-color: var(--accent);
        }
        
        .btn-primary {
            background: var(--accent);
            color: #000;
            font-weight: 600;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .chart-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .chart-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .chart-filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }
        
        canvas {
            max-height: 300px;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
        }
        
        #tzSelect {
            padding: 8px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <div class="title" id="sensorTitle">Загрузка...</div>
                <select id="tzSelect">
                    <option value="+3">UTC+3</option>
                    <option value="+4">UTC+4</option>
                    <option value="+5">UTC+5</option>
                    <option value="+6">UTC+6</option>
                    <option value="+7" selected>UTC+7</option>
                    <option value="+8">UTC+8</option>
                    <option value="+9">UTC+9</option>
                    <option value="+10">UTC+10</option>
                    <option value="+11">UTC+11</option>
                    <option value="+12">UTC+12</option>
                </select>
            </div>
            <button class="btn" onclick="goBack()">← Назад</button>
        </div>
        
        <div class="stats-grid" id="statsGrid">
            <div class="loading">Загрузка данных...</div>
        </div>
        
        <div class="chart-container">
            <div class="chart-header">
                <div class="chart-title">Заряд батареи</div>
                <div class="chart-filters">
                    <button class="filter-btn active" data-chart="battery" data-period="60">1ч</button>
                    <button class="filter-btn" data-chart="battery" data-period="360">6ч</button>
                    <button class="filter-btn" data-chart="battery" data-period="1440">24ч</button>
                    <button class="filter-btn" data-chart="battery" data-period="10080">7д</button>
                </div>
            </div>
            <canvas id="batteryChart"></canvas>
        </div>
        
        <div class="chart-container">
            <div class="chart-header">
                <div class="chart-title">Крен (Roll)</div>
                <div class="chart-filters">
                    <button class="filter-btn active" data-chart="roll" data-period="60">1ч</button>
                    <button class="filter-btn" data-chart="roll" data-period="360">6ч</button>
                    <button class="filter-btn" data-chart="roll" data-period="1440">24ч</button>
                    <button class="filter-btn" data-chart="roll" data-period="10080">7д</button>
                </div>
            </div>
            <canvas id="rollChart"></canvas>
        </div>
        
        <div class="chart-container">
            <div class="chart-header">
                <div class="chart-title">Тангаж (Pitch)</div>
                <div class="chart-filters">
                    <button class="filter-btn active" data-chart="pitch" data-period="60">1ч</button>
                    <button class="filter-btn" data-chart="pitch" data-period="360">6ч</button>
                    <button class="filter-btn" data-chart="pitch" data-period="1440">24ч</button>
                    <button class="filter-btn" data-chart="pitch" data-period="10080">7д</button>
                </div>
            </div>
            <canvas id="pitchChart"></canvas>
        </div>
        
        <div class="chart-container">
            <div class="chart-header">
                <div class="chart-title">Температура (°C)</div>
                <div class="chart-filters">
                    <button class="filter-btn active" data-chart="temperature" data-period="60">1ч</button>
                    <button class="filter-btn" data-chart="temperature" data-period="360">6ч</button>
                    <button class="filter-btn" data-chart="temperature" data-period="1440">24ч</button>
                    <button class="filter-btn" data-chart="temperature" data-period="10080">7д</button>
                </div>
            </div>
            <canvas id="temperatureChart"></canvas>
        </div>
    </div>
    
    <script src="timezone.js"></script>
    <script src="sensor-detail.js"></script>
</body>
</html>
